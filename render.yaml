# Render Blueprint Specification for Andina Pro
services:
  - type: web
    name: andina-pro
    env: python
    # Use free tier since persistent storage is no longer needed
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py main:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.13
