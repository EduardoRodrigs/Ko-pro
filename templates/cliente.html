{% block scripts %}
<script>
    const codCliente = "{{ cod_cliente }}";
    const canaisSempreJuntos = ['Bar', 'Lanchonete', 'Restaurante', 'Padaria', 'Mercearia'];
    
    document.addEventListener('DOMContentLoaded', () => {
        loadClienteData(codCliente);
    });

    function toggleSublist(category) {
        const content = document.getElementById(`sublist-${category}`);
        const chevron = document.getElementById(`chevron-${category}`);
        if (content.classList.contains('expanded')) {
            content.classList.remove('expanded');
            chevron.classList.remove('rotate-180');
        } else {
            content.classList.add('expanded');
            chevron.classList.add('rotate-180');
        }
    }

    async function toggleCategory(category) {
        const chk = document.getElementById(`chk-${category}`);
        const val = chk.checked;
        
        await saveCheck(category);
        
        if (!val) {
            const sublist = document.getElementById(`sublist-${category}`);
            if (sublist) {
                sublist.querySelectorAll('input[type="checkbox"]').forEach(subChk => {
                    subChk.checked = false;
                });
            }
        }
    }

    async function saveSubItem(category, subitem) {
        const key = `${category}:${subitem}`;
        const chk = document.getElementById("chk-" + key);
        const val = chk ? chk.checked : false;
        
        showToast('Salvando...');
        try {
            await fetch(`/api/positivacao/${codCliente}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({[key]: val})
            });
            
            // Inteligência de Vínculo: if checked, check the parent category checkbox
            if (val) {
                const parentChk = document.getElementById(`chk-${category}`);
                if (parentChk && !parentChk.checked) {
                    parentChk.checked = true;
                    // Save parent category to database
                    await fetch(`/api/positivacao/${codCliente}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({[category]: true})
                    });
                }
            }
            showToast('Salvo!');
        } catch(e) {
            showToast('Erro ao salvar');
        }
    }
</script>
