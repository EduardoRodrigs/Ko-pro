<script>
    // Run content load immediately on swap/render
    loadClienteData("{{ cod_cliente }}");
    
    // Bind HTMX request events to show checking saved successes
    document.body.addEventListener('htmx:afterRequest', function(evt) {
        if (evt.detail.target && (evt.detail.target.id === 'cliente-drawer-content' || evt.detail.target.closest('#cliente-drawer-content'))) {
            if (evt.detail.successful) {
                const successEl = document.getElementById('save-success');
                if (successEl) {
                    successEl.classList.remove('hidden');
                    setTimeout(() => {
                        successEl.classList.add('hidden');
                    }, 1200);
                }
            }
        }
    });
</script>
