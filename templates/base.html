<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andina Pro</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#b91c1c">
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            light: '#f87171',
                            DEFAULT: '#dc2626',
                            dark: '#991b1b',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 text-gray-800 antialiased pb-20">

    <!-- Top Accent Header Bar -->
    <header class="bg-brand h-4 sticky top-0 z-50 shadow-md"></header>

    <!-- Main Content -->
    <main class="w-full max-w-md mx-auto p-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] z-50">
        <div class="flex justify-around items-center max-w-md mx-auto">
            <a href="/" class="flex flex-col items-center py-2 px-4 text-gray-500 hover:text-brand transition-all active:scale-95 duration-75 {% if request.url.path == '/' %}text-brand font-semibold{% endif %}">
                <i class="ph ph-house text-2xl mb-1"></i>
                <span class="text-xs">Início</span>
            </a>
            <a href="/metas" class="flex flex-col items-center py-2 px-4 text-gray-500 hover:text-brand transition-all active:scale-95 duration-75 {% if request.url.path == '/metas' %}text-brand font-semibold{% endif %}">
                <i class="ph ph-target text-2xl mb-1"></i>
                <span class="text-xs">Metas</span>
            </a>
            <a href="/config" class="flex flex-col items-center py-2 px-4 text-gray-500 hover:text-brand transition-all active:scale-95 duration-75 {% if request.url.path == '/config' %}text-brand font-semibold{% endif %}">
                <i class="ph ph-gear text-2xl mb-1"></i>
                <span class="text-xs">Ajustes</span>
            </a>
        </div>
    </nav>

    <!-- App JS -->
    <script src="/static/js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js').then(() => {
                console.log('Service Worker Registered');
            });
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
